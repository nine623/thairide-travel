<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/ThaiRide/logo.png">
    <title>ThaiRide Travel | Bangkok Airport Transfer</title>

    <style>
        /* จัดการพื้นฐานไม่ให้ล้นและยืดเต็มจอ */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            overflow-x: hidden; /* ห้ามเลื่อนซ้ายขวา */
            width: 100%;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        /* HEADER - ปรับให้โลโก้และเมนูดูดีขึ้น */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img { height: 50px; }
        .logo-text { font-size: 20px; font-weight: bold; color: #38bdf8; line-height: 1.2; }

        nav {
            display: flex;
            flex-direction: column;
            text-align: right;
            font-size: 12px;
            gap: 2px;
        }

        nav a { color: #94a3b8; text-decoration: none; }

        /* BANNER & BUTTONS */
        .promo-banner {
            background: #f97316;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .line-btn {
            background: #06C755;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        /* HERO IMAGE - ปรับให้ใหญ่เต็มจอ */
        .hero {
            width: 100%;
            position: relative;
            margin-bottom: 20px;
        }

        .hero img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* SEARCH FORM - ปรับให้ยืดเต็มจอ */
        .search-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .search-box h3 { margin-top: 0; text-align: center; color: #38bdf8; }

        .search-box input, .search-box select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        .search-btn {
            width: 100%;
            background: #f97316;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* SERVICE GRID - แก้ไขส่วนที่ล้นในรูป */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* เรียง 3 คอลัมน์ให้พอดีจอ */
            gap: 10px;
            margin-top: 20px;
        }

        .service-card {
            background: #1e293b;
            padding: 15px 5px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }

        .service-card img {
            width: 80%;
            max-width: 80px;
            margin-bottom: 10px;
        }

        .service-card h4 {
            font-size: 12px;
            margin: 0;
            color: #f1f5f9;
        }

        /* FLOATING ACTION BUTTON */
        .float-contact {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
        }

        .float-btn {
            background: #06C755;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Responsive สำหรับจอคอม */
        @media (min-width: 768px) {
            .services-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .promo-banner { flex-direction: row; justify-content: center; }
            nav { flex-direction: row; gap: 20px; font-size: 16px; }
        }

    </style>
</head>
<body>

<div class="container">

    <header>
        <div class="logo">
            <img src="logo_01.png" alt="Logo">
            <div class="logo-text">ThaiRide<br>Travel</div>
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Tours</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="promo-banner">
        <span>🚐 Bangkok Airport Transfer 24 Hours</span>
        <a href="https://line.me/R/ti/p/@775hjmvl" class="line-btn">
            Chat on LINE
        </a>
    </div>

    <section class="hero">
        <img src="heroslide_01.png" alt="Bangkok Airport Transfer">
    </section>

    <div class="search-box">
        <h3>🔍 Search Bangkok Hotels</h3>
        <form action="https://www.agoda.com/partners/partnersearch.aspx" method="get" target="_blank">
            <input type="hidden" name="cid" value="1434592">
            <input type="text" name="city" value="Bangkok" placeholder="City">
            <div style="display: flex; gap: 10px;">
                <input type="text" placeholder="Check-in" onfocus="(this.type='date')">
                <input type="text" placeholder="Check-out" onfocus="(this.type='date')">
            </div>
            <button type="submit" class="search-btn">Search Hotels</button>
        </form>
    </div>

    <div class="services-grid">
        <div class="service-card">
            <img src="altis.png" alt="Private Car">
            <h4>Private Car</h4>
        </div>
        <div class="service-card">
            <img src="suv.png" alt="SUV">
            <h4>SUV Transfer</h4>
        </div>
        <div class="service-card">
            <img src="van.png" alt="VIP Van">
            <h4>VIP Van</h4>
        </div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <a href="#thairide-booking" style="background:#f97316; color:white; padding:15px 40px; border-radius:10px; text-decoration:none; font-weight:bold; display:inline-block; width:100%;">
            BOOK NOW
        </a>
    </div>

    <footer style="margin-top: 50px; text-align: center; padding: 20px; color: #64748b; font-size: 14px;">
        <img src="logo_01.png" height="40" style="opacity: 0.5; margin-bottom: 10px;"><br>
        © 2026 ThaiRide Travel. All Rights Reserved.
    </footer>

</div>

<div class="float-contact">
    <a href="https://line.me/R/ti/p/@775hjmvl" class="float-btn">
        <span>💬 Book via LINE</span>
    </a>
</div>

</body>
</html>
