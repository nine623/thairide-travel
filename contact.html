<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ติดต่อจองรถ | Thai Ride Travel</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

header{
background:#0b2c4a;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* HERO */

.hero img{
width:100%;
height:250px;
object-fit:cover;
}

/* SECTION */

section{
padding:40px;
text-align:center;
}

/* FORM */

.form-box{
background:white;
max-width:600px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:left;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,select,textarea{

width:100%;
padding:12px;
margin-top:5px;

border-radius:8px;
border:1px solid #ccc;

font-size:16px;

}

.book-btn{

background:#00b900;
color:white;
border:none;

padding:15px;

border-radius:30px;

font-size:18px;

cursor:pointer;

width:100%;
margin-top:20px;

}

/* CLOCK BOX */

.sidebar{

position:fixed;

left:20px;
top:150px;

width:160px;

background:black;
color:white;

padding:15px;

border-radius:15px;

line-height:26px;

box-shadow:0 10px 25px rgba(0,0,0,0.4);

}

/* MOBILE */

@media(max-width:768px){

.sidebar{
display:none;
}

}

/* FOOTER */

footer{
background:#0b2c4a;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<h2>Thai Ride Travel</h2>

<nav>

<a href="index.html">หน้าแรก</a>
<a href="tour.html">สถานที่ท่องเที่ยว</a>
<a href="contact.html">ติดต่อเรา</a>

</nav>

</header>

<section class="hero">

<img src="contact-header.png">

</section>

<section>

<h2>ติดต่อจองรถ</h2>

<p>งานด่วน กรุณาทัก LINE Official Account เท่านั้น</p>

<br>

<img src="line-qr.png" width="200">

<br><br>

<a href="https://lin.ee/eepk52C">

<button class="book-btn" style="width:220px">
ทัก LINE เพื่อจองรถ
</button>

</a>

<br><br><br>

<div class="form-box">

<form id="bookingForm">

<label>ชื่อผู้จอง</label>
<input type="text" id="name" required>

<label>วันที่เดินทาง</label>
<input type="date" id="date" required>

<label>เวลาเดินทาง</label>
<input type="time" id="time" required>

<label>จุดรับ</label>
<input type="text" id="pickup" required>

<label>จุดส่ง</label>
<input type="text" id="dropoff" required>

<label>ประเภทรถ</label>

<select id="car">

<option>Alphard</option>
<option>Camry</option>
<option>SUV</option>
<option>Van</option>

</select>

<label>จำนวนผู้โดยสาร</label>
<input type="number" id="passenger">

<label>จำนวนกระเป๋า</label>
<input type="number" id="bag">

<label>หมายเหตุ</label>
<textarea id="note"></textarea>

<button type="submit" class="book-btn">
ส่งข้อมูล
</button>

</form>

</div>

</section>

<div class="sidebar">

<div id="dateBox"></div>

<div id="timeBox"></div>

<div id="visitBox"></div>

<div id="countryBox"></div>

</div>

<footer>

© 2025 Thai Ride Travel

</footer>

<script>

/* CLOCK */

function updateClock(){

let now=new Date()

document.getElementById("dateBox").innerHTML=
"📅 "+now.toLocaleDateString("th-TH")

document.getElementById("timeBox").innerHTML=
"⏰ "+now.toLocaleTimeString("th-TH")

}

setInterval(updateClock,1000)

/* VISIT */

let visit=localStorage.getItem("visit")||0

visit++

localStorage.setItem("visit",visit)

document.getElementById("visitBox").innerHTML=
"👀 Visits : "+visit

/* COUNTRY */

fetch("https://ipapi.co/json/")

.then(res=>res.json())

.then(data=>{

document.getElementById("countryBox").innerHTML=
"🌍 "+data.country_name

})

/* SEND TO LINE */

document.getElementById("bookingForm")

.addEventListener("submit",function(e){

e.preventDefault()

let name=document.getElementById("name").value

let date=document.getElementById("date").value

let time=document.getElementById("time").value

let pickup=document.getElementById("pickup").value

let dropoff=document.getElementById("dropoff").value

let car=document.getElementById("car").value

let passenger=document.getElementById("passenger").value

let bag=document.getElementById("bag").value

let note=document.getElementById("note").value

let message=

`จองรถ Thai Ride Travel

ชื่อ : ${name}

วันที่ : ${date}

เวลา : ${time}

จุดรับ : ${pickup}

จุดส่ง : ${dropoff}

รถ : ${car}

ผู้โดยสาร : ${passenger}

กระเป๋า : ${bag}

หมายเหตุ : ${note}`

let url="https://line.me/R/msg/text/?"+encodeURIComponent(message)

window.open(url)

})

</script>

</body>
</html>
