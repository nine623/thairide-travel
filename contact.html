<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThaiRide Travel - Booking</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt', sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=1500&q=80');
background-size:cover;
background-position:center;
}

.form-container{
background:#ffffff;
width:100%;
max-width:600px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:500;
}

input, select, textarea{
width:100%;
padding:12px;
margin-top:5px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
resize:none;
height:80px;
}

button{
margin-top:25px;
width:100%;
padding:15px;
background:#00c853;
border:none;
border-radius:30px;
font-size:18px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00b44a;
}

</style>
</head>

<body>

<div class="form-container">
<h2>แบบฟอร์มจองรถ</h2>

<form id="bookingForm">

<label>ชื่อผู้จอง</label>
<input type="text" name="name" required>

<label>วันที่เดินทาง</label>
<input type="date" name="date" required>

<label>เวลาเดินทาง</label>
<input type="time" name="time" required>

<label>จุดรับ</label>
<input type="text" name="pickup" required>

<label>จุดส่ง</label>
<input type="text" name="dropoff" required>

<label>ประเภทรถ</label>
<select name="car">
<option>Alphard</option>
<option>Camry</option>
<option>Fortuner</option>
<option>Van</option>
</select>

<label>จำนวนผู้โดยสาร</label>
<input type="number" name="passenger" required>

<label>หมายเหตุเพิ่มเติม</label>
<textarea name="note"></textarea>

<button type="submit">ส่งข้อมูล</button>

</form>
</div>

<script>
(function(){
emailjs.init("YOUR_PUBLIC_KEY"); // ใส่ Public Key ของคุณ
})();

document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();

emailjs.sendForm("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",this)
.then(function(){
alert("ส่งข้อมูลสำเร็จ");
document.getElementById("bookingForm").reset();
}, function(error){
alert("เกิดข้อผิดพลาด");
});
});
</script>

</body>
</html>
