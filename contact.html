<section class="container">

<h1>จองรถ</h1>


<form id="bookingForm">

<input type="text" id="name" placeholder="ชื่อผู้จอง" required>

<label>วันที่เดินทาง</label>
<input type="date" id="date" required>

<label>เวลาเดินทาง</label>
<input type="time" id="time" required>

<input type="text" id="pickup" placeholder="จุดรับ" required>

<input type="text" id="dropoff" placeholder="จุดส่ง" required>


<select id="car">

<option>Alphard</option>
<option>Camry</option>
<option>SUV</option>
<option>Van</option>

</select>


<input type="number" id="passengers" placeholder="จำนวนผู้โดยสาร" required>


<textarea id="note" placeholder="หมายเหตุเพิ่มเติม"></textarea>


<button type="submit" class="line-btn">

ส่งข้อมูลไป LINE

</button>

</form>

</section>


<div class="clockBox">

<div id="dateNow"></div>

<div id="timeNow"></div>

</div>
