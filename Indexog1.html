<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ThaiRide Travel | New Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@500;600&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; max-width: 100vw; overflow-x: hidden !important; background: #0f172a; color: #ffffff; font-family: 'Sarabun', sans-serif; }
    .nav-bar { width: 100%; background: #1e293b; padding: 12px 20px; display: flex; align-items: center; border-bottom: 2px solid #38bdf8; position: sticky; top: 0; z-index: 999; }
    .brand { display: flex; align-items: center; gap: 10px; font-family: 'Prompt'; font-weight: 600; color: #38bdf8; font-size: 1.2rem; }
    .hero-box { width: 100%; background: #000; line-height: 0; }
    .hero-box img { width: 100%; height: auto; display: block; }
    .container { padding: 15px; width: 100%; }
    .card { background: #1e293b; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .card h2 { font-family: 'Prompt'; color: #facc15; margin-bottom: 10px; }
    .btn-line { display: flex; align-items: center; justify-content: center; background: #06C755; color: #fff; text-decoration: none; padding: 15px; border-radius: 12px; font-family: 'Prompt'; font-weight: 600; width: 100%; margin-top: 15px; }
    .car-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    .car-item { background: #0f172a; padding: 10px; border-radius: 10px; text-align: center; }
    .car-item img { width: 100%; max-width: 60px; height: auto; }
    footer { background: #1e293b; padding: 30px 20px; text-align: center; border-top: 1px solid #334155; }
</style>
</head>
<body>
    <nav class="nav-bar"><div class="brand">ThaiRide Travel</div></nav>
    <div class="hero-box"><img src="heroslide_01.png"></div>
    <div class="container">
        <div class="card">
            <h2>🚐 รับ-ส่งสนามบิน 24 ชม.</h2>
            <p>บริการรถส่วนตัว ราคามาตรฐาน ปลอดภัย ตรงเวลา</p>
            <div class="car-grid">
                <div class="car-item"><img src="altis.png"></div>
                <div class="car-item"><img src="suv.png"></div>
                <div class="car-item"><img src="van.png"></div>
            </div>
            <a href="https://line.me/R/ti/p/@775hjmvl" class="btn-line">🟢 จองผ่าน LINE</a>
        </div>
    </div>
    <footer><p>© 2026 ThaiRide Travel</p></footer>
</body>
</html>
