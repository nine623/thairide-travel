<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ThaiRide Travel | Bangkok Airport Transfer Private Taxi & Thailand Tour</title>

<meta name="description" content="Bangkok Airport Transfer Private Taxi Service. Safari World Tour, Floating Market Tour and VIP Van Service in Thailand. Book your private ride today.">

<meta name="keywords" content="Bangkok Airport Transfer, Private Taxi Bangkok, Safari World Tour, Floating Market Tour, VIP Van Bangkok, Thailand Tour">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://thairidetravel.com/">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:45px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

nav a:hover{
color:#38bdf8;
}

/* HERO SLIDER */

.hero{
position:relative;
margin-top:20px;
overflow:hidden;
border-radius:10px;
}

.slider{
display:flex;
width:300%;
animation:slideHero 12s infinite;
}

.slider img{
width:100%;
}

/* SLIDE ANIMATION */

@keyframes slideHero{

0%{transform:translateX(0%)}
30%{transform:translateX(0%)}

35%{transform:translateX(-100%)}
65%{transform:translateX(-100%)}

70%{transform:translateX(-200%)}
100%{transform:translateX(-200%)}

}

.clock{
position:absolute;
top:20px;
right:20px;
font-size:26px;
background:rgba(0,0,0,0.6);
padding:12px 20px;
border-radius:10px;
text-align:center;
}

.date{
font-size:14px;
opacity:0.8;
margin-top:5px;
}

/* SCROLL */

.scroll{
overflow:hidden;
white-space:nowrap;
margin-top:25px;
}

.scroll span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
color:#38bdf8;
font-size:22px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* VEHICLES */

.vehicles{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.vehicle{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.vehicle img{
width:100%;
border-radius:10px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:30px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* REVIEWS */

.reviews{
margin-top:40px;
}

.review{
background:#1e293b;
padding:20px;
margin-top:10px;
border-radius:10px;
}

/* BLOG */

.blog{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.post{
background:#1e293b;
padding:20px;
border-radius:10px;
}

/* VISITOR */

.visitor-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
text-align:center;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
}

/* MAP */

.map{
margin-top:40px;
}

.line-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

footer{
margin-top:40px;
text-align:center;
opacity:0.7;
}

@media(max-width:768px){

.gallery,
.vehicles,
.blog,
.visitor-box{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo.png">
<h1>ThaiRide Travel</h1>
</div>

<nav>
<a href="#">Home</a>
<a href="#gallery">Gallery</a>
</nav>

</header>

<!-- HERO SLIDE -->

<section class="hero">

<div class="slider">

<img src="heroslide_01.png">
<img src="heroslide_02.png">
<img src="heroslide_03.png">

</div>

<div class="clock">
<div id="clock"></div>
<div class="date" id="date"></div>
</div>

</section>

<div class="scroll">
<span>
Premium Airport Transfer • Safari World Tour • Floating Market Tour • Bangkok Private Car Service
</span>
</div>

<footer>
©2026 ThaiRide Travel
</footer>

</div>

<a href="https://line.me/R/ti/p/@775hjmvl" class="line-btn">
LINE Booking
</a>

<script>

function updateClock(){

let now = new Date();

let time = now.toLocaleTimeString();
document.getElementById("clock").innerHTML = time;

let date = now.toLocaleDateString("en-US",{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
});

document.getElementById("date").innerHTML = date;

}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
