<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ThaiRide Travel | Bangkok Airport Transfer</title>

<meta name="description" content="Bangkok Airport Transfer Private Taxi Service. Safari World Tour, Floating Market Tour and VIP Van Service in Thailand.">

<meta name="keywords" content="Bangkok Airport Transfer, Private Taxi Bangkok, Safari World Tour, VIP Van Bangkok">

<meta name="robots" content="index, follow">

<link rel="canonical" href="https://nine623.github.io/thairide-travel/">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */

.hero{
position:relative;
margin-top:20px;
height:420px;
border-radius:12px;
overflow:hidden;
}

/* SLIDE */

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1.5s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{
opacity:1;
}

/* CLOCK */

.clock{
position:absolute;
top:20px;
right:20px;
font-size:24px;
background:rgba(0,0,0,0.6);
padding:12px 20px;
border-radius:10px;
text-align:center;
}

.date{
font-size:14px;
opacity:0.8;
}

/* SCROLL */

.scroll{
overflow:hidden;
white-space:nowrap;
margin-top:25px;
}

.scroll span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
color:#38bdf8;
font-size:20px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* VEHICLES */

.vehicles{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.vehicle{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.vehicle img{
width:100%;
border-radius:10px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:30px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* LINE */

.line-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:white;
padding:14px 18px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

.hero{
height:260px;
}

.gallery,
.vehicles{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo.png">
<h2>ThaiRide Travel</h2>
</div>

<nav>
<a href="#">Home</a>
<a href="#gallery">Gallery</a>
</nav>

</header>

<!-- HERO -->

<section class="hero">

<div class="slide active">
<img src="heroslide_01.png">
</div>

<div class="slide">
<img src="heroslide_02.png">
</div>

<div class="slide">
<img src="heroslide_03.png">
</div>

<div class="clock">
<div id="clock"></div>
<div class="date" id="date"></div>
</div>

</section>

<div class="scroll">
<span>
Premium Airport Transfer • Safari World Tour • Floating Market Tour • Bangkok Private Car Service
</span>
</div>

<h2>Our Vehicles</h2>

<div class="vehicles">

<div class="vehicle">
<img src="altis.png">
<h3>Toyota Camry</h3>
<p>Luxury airport transfer</p>
</div>

<div class="vehicle">
<img src="suv.png">
<h3>Toyota Altis</h3>
<p>Comfort private ride</p>
</div>

<div class="vehicle">
<img src="van.png">
<h3>VIP Van</h3>
<p>Perfect for family trip</p>
</div>

</div>

<section id="gallery">

<h2>Photo Gallery</h2>

<div class="gallery">

<img src="G-01.png">
<img src="G-02.png">
<img src="G-03.png">
<img src="G-04.png">
<img src="hero_05.png">
<img src="hero_06.png">

</div>

</section>

</div>

<a href="https://line.me/R/ti/p/@775hjmvl" class="line-btn">
LINE Booking
</a>

<script>

/* CLOCK */

function updateClock(){

let now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString();

document.getElementById("date").innerHTML =
now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

}

setInterval(updateClock,1000);
updateClock();

/* HERO SLIDE */

let slides=document.querySelectorAll(".slide");
let index=0;

function showSlide(){

slides.forEach(slide=>slide.classList.remove("active"));

index++;

if(index>=slides.length){
index=0;
}

slides[index].classList.add("active");

}

setInterval(showSlide,4000);

</script>

</body>
</html>
