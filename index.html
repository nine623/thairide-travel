<style>

/* GENERAL */

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* HEADER */

header{
display:flex;

align-items:center;
}

.logo{

}

.logo img{
height:70px;
}

.logo-text{
font-size:28px;
font-weight:bold;

}

.clock{
color:#facc15;

}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

/* HERO */

.hero{
position:relative;
}

.hero img{
width:100%;
border-radius:10px;
display:none;
}

.hero img.active{
display:block;
}

.hero-text{

.hero-text h1{

.book-btn{

}

/* SERVICES */

.services{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.service-box{
background:#1e293b;
padding:20px;
border-radius:10px;

}

.service-box img{

}

/* FLOATING CHAT */

.chat-widget{
position:fixed;
right:20px;
bottom:20px;
z-index:9999;
}

.chat-main{
background:#2563eb;
color:white;
padding:14px 20px;
border-radius:30px;
cursor:pointer;
font-weight:bold;

}

.chat-menu{
display:none;
flex-direction:column;

}

.chat-menu a{

}

.line-chat{
background:#06C755;
}

.whatsapp-chat{
background:#25D366;
}

.chat-menu img{
width:24px;
}

</style>

</head>

<body>

<div class="container">

</div>

<!-- FLOATING CHAT -->

</a>

</div>

</div>

<script>

/* HERO SLIDE */

let slide=0
let slides=document.querySelectorAll(".hero img")

function showSlide(){

slides.forEach(s=>s.classList.remove("active"))

slide++

if(slide>=slides.length){
slide=0
}

slides[slide].classList.add("active")

}

setInterval(showSlide,4000)

/* CLOCK */

function updateClock(){

let now=new Date()

let time=now.toLocaleTimeString()

document.getElementById("clock").innerHTML=time

}

setInterval(updateClock,1000)

updateClock()

/* CHAT MENU */

function toggleChat(){

let menu=document.getElementById("chatMenu")

if(menu.style.display==="flex"){
menu.style.display="none"
}else{
menu.style.display="flex"
}

}

</script>

</body>
