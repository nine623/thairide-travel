<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThaiRide Travel | Bangkok Airport Transfer</title>

<meta name="description" content="Bangkok Airport Transfer Private Taxi Safari World Floating Market Tour Thailand">
<meta name="keywords" content="Bangkok Airport Transfer, Private Taxi Bangkok, Safari World Tour, Floating Market Tour">

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#020617;
padding:20px;
font-size:28px;
font-weight:bold;
}

.hero{
padding:80px 20px;
}

.scroll{
background:#0284c7;
padding:10px;
overflow:hidden;
white-space:nowrap;
}

.scroll span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.date-center{
margin-top:10px;
font-size:18px;
}

#time{
font-size:26px;
color:#38bdf8;
margin-top:5px;
}

.visitor-box{
margin-top:30px;
font-size:18px;
background:#020617;
padding:20px;
border-radius:10px;
display:inline-block;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:10px;
}

footer{
margin-top:40px;
padding:20px;
background:#020617;
}

</style>

<!-- GoatCounter Tracking -->

<script data-goatcounter="https://thairidetravel.goatcounter.com/count"
async src="//gc.zgo.at/count.js"></script>

</head>

<body>

<header>

ThaiRide Travel

</header>

<section class="hero">

<h1>Bangkok Private Taxi Service</h1>

<p>Airport Transfer • Safari World • Floating Market</p>

</section>

<div class="scroll">
<span>
Premium Airport Transfer • Safari World Tour • Floating Market Tour • Bangkok Private Car Service
</span>
</div>

<div class="date-center">
<div id="date"></div>
<div id="time"></div>
</div>

<!-- Visitor Counter -->

<div class="visitor-box">

<div>Total Visitors</div>
<div style="font-size:30px" id="gc-total">Loading...</div>

<br>

<div>Visitors Now</div>
<div style="font-size:26px" id="gc-live">Loading...</div>

</div>

<!-- Gallery -->

<div class="gallery">

<img src="https://images.unsplash.com/photo-1504215680853-026ed2a45def">

<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

<img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429">

<img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d">

<img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1">

</div>

<footer>

© 2026 ThaiRide Travel

</footer>

<script>

function updateClock(){

let now=new Date()

let time=now.toLocaleTimeString()

let date=now.toLocaleDateString("en-US",{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
})

document.getElementById("time").innerHTML=time
document.getElementById("date").innerHTML=date

}

setInterval(updateClock,1000)

updateClock()

</script>

<script>

fetch("https://YOURCODE.goatcounter.com/counter/TOTAL.json")
.then(res=>res.json())
.then(data=>{
document.getElementById("gc-total").innerText=data.count
})

</script>

</body>

</html>
