<section class="hero">

<div class="hero-slide">

<img src="heroslide_01.png" class="active">
<img src="heroslide_02.png">
<img src="heroslide_03.png">

</div>

<div class="clock">
<div id="clock"></div>
</div>

</section>

<style>

/* HERO */

.hero{
position:relative;
overflow:hidden;
}

.hero-slide{
position:relative;
}

.hero-slide img{
width:100%;
display:none;
border-radius:10px;
}

.hero-slide img.active{
display:block;
}

/* CLOCK */

.clock{
position:absolute;
right:20px;
top:20px;
background:white;
padding:10px;
font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

.hero-slide img{
height:220px;
object-fit:cover;
}

}

</style>

<script>

/* CLOCK */

function updateClock(){

let now = new Date();

let h = now.getHours().toString().padStart(2,'0');
let m = now.getMinutes().toString().padStart(2,'0');
let s = now.getSeconds().toString().padStart(2,'0');

document.getElementById("clock").innerHTML = h+":"+m+":"+s;

}

setInterval(updateClock,1000);



/* HERO SLIDE */

let slideIndex = 0;

let slides = document.querySelectorAll(".hero-slide img");

function showSlide(){

slides.forEach(img => img.classList.remove("active"));

slideIndex++;

if(slideIndex > slides.length){

slideIndex = 1;

}

slides[slideIndex-1].classList.add("active");

}

showSlide();

setInterval(showSlide,4000);

</script>
