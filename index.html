<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.hero{
position:relative;
height:420px;
overflow:hidden;
border-radius:10px;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
animation:slide 15s infinite;
}

@keyframes slide{
0%{opacity:1}
33%{opacity:0}
66%{opacity:0}
100%{opacity:1}
}

.review{
background:#0b3d6d;
color:white;
padding:10px;
margin-top:10px;
overflow:hidden;
}

.review span{
display:inline-block;
padding-left:100%;
animation:review 20s linear infinite;
}

@keyframes review{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.gallery{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:30px;
}

.gallery img{
width:100%;
height:420px;
object-fit:cover;
border-radius:8px;
}

.lineFloat{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
padding:12px 16px;
border-radius:50px;
color:white;
font-weight:bold;
text-decoration:none;
}

footer{
margin-top:40px;
background:#0b3d6d;
color:white;
text-align:center;
padding:20px;
}

.clock{
position:absolute;
top:20px;
right:20px;
background:#0b3d6d;
color:white;
padding:10px;
border-radius:8px;
}

</style>
</head>
