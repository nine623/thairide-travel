<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai Ride Travel</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HERO HEADER */
.hero {
    position: relative;
    height: 450px; /* ไม่เต็มจอ */
    background: url('hero_01.png') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 20px;
    margin-bottom: 25px;
}

.hero-buttons a {
    text-decoration: none;
    padding: 12px 24px;
    margin: 0 10px;
    border-radius: 6px;
    font-weight: bold;
    display: inline-block;
}

.btn-green {
    background: #28a745;
    color: white;
}

.btn-blue {
    background: #007bff;
    color: white;
}

.btn-green:hover,
.btn-blue:hover {
    opacity: 0.85;
}
</style>
</head>

<body>

<header class="hero">
    <div class="hero-content">
        <h1>Safari World Bangkok</h1>
        <p>Wild Adventure Awaits</p>
        <div class="hero-buttons">
            <a href="#" class="btn-green">View Attractions</a>
            <a href="#" class="btn-blue">Show Schedule</a>
        </div>
    </div>
</header>

</body>
</html>
