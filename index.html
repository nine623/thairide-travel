<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Airport Transfer Booking</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

.header{
background:#000;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.container{
width:90%;
max-width:600px;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:15px;
background:#28a745;
color:white;
font-size:18px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#218838;
}

.contact{
text-align:center;
margin-top:30px;
}

.contact a{
display:inline-block;
margin:10px;
padding:10px 20px;
background:#333;
color:white;
text-decoration:none;
border-radius:5px;
}

.qr{
text-align:center;
margin-top:30px;
}

.qr img{
width:150px;
margin:10px;
}

</style>

</head>

<body>

<div class="header">
Airport Transfer Booking
</div>

<div class="container">

<form action="mailto:nine623@gmail.com" method="post" enctype="text/plain">

<label>Full Name</label>
<input type="text" name="Name" required>

<label>Contact (Phone / WhatsApp)</label>
<input type="text" name="Contact" required>

<label>Pickup Location</label>
<input type="text" name="Pickup" required>

<label>Dropoff Location</label>
<input type="text" name="Dropoff" required>

<label>Pickup Date</label>
<input type="date" id="date" name="Date" required>

<label>Pickup Time</label>
<input type="time" id="time" name="Time" required>

<label>Passengers</label>
<select name="Passengers">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<label>Message</label>
<input type="text" name="Message">

<button type="submit">Book Now</button>

</form>

<div class="contact">

<h3>Contact Us</h3>

<a href="https://line.me/">LINE</a>

<a href="https://wa.me/">WhatsApp</a>

<a href="https://wechat.com/">WeChat</a>

<a href="mailto:nine623@gmail.com">Email</a>

</div>

<div class="qr">

<h3>Scan to Contact</h3>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://line.me/" alt="LINE QR">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/" alt="WhatsApp QR">

</div>

</div>

<script>

window.onload = function(){

let now = new Date()

let date = now.toISOString().split('T')[0]

let time = now.toTimeString().slice(0,5)

document.getElementById("date").value = date

document.getElementById("time").value = time

}

</script>

</body>
</html>
