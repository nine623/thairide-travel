.container{

padding:20px;
}

header{
display:flex;
align-items:center;
justify-content:space-between;

}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:50px;

nav a{

}

.hero{
position:relative;
height:450px;

border-radius:10px;
overflow:hidden;
}

.car{
position:absolute;
bottom:30px;
left:-300px;
width:300px;
animation:carMove 12s linear infinite;
}

@keyframes carMove{
0%{left:-300px;}
100%{left:120%;}
}

.services{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.card{
background:white;

}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.vehicles{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:40px;
}

.gallery{
display:grid;

gap:15px;

}

.gallery img{
width:100%;
height:160px;

.booking{

margin-top:40px;

form{

padding:20px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#ffb400;
border:none;
font-weight:bold;
cursor:pointer;
}

.stats{
position:absolute;
top:20px;

background:#0b3d6d;

padding:15px;
border-radius:10px;
}

.clock{
