<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThaiRide Travel | รถเช่าพร้อมคนขับ กรุงเทพ พัทยา อยุธยา</title>
<meta name="description" content="ThaiRide Travel บริการรถ SUV พร้อมคนขับ รับส่งสนามบิน เที่ยวกรุงเทพ พัทยา อยุธยา จองออนไลน์ได้ทันที">
<meta name="keywords" content="รถเช่าพร้อมคนขับ, รถ SUV กรุงเทพ, รับส่งสนามบิน, เที่ยวพัทยา, ThaiRide">

window.dataLayer = window.dataLayer || [];

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body,html{
margin:0;
padding:0;
font-family:'Kanit',sans-serif;
color:white;
overflow-x:hidden;
}

video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
object-fit:cover;
filter:brightness(40%);
}

.container{
text-align:center;
padding:100px 20px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:gold;
cursor:pointer;
font-weight:bold;
}

.section{
background:#111;
padding:60px 20px;
}

.review{
animation:scroll 20s linear infinite;
white-space:nowrap;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

form input, form select{
padding:12px;
margin:10px;
width:250px;
border-radius:10px;
border:none;
}

.footer{
background:black;
padding:30px;
text-align:center;
}
</style>
</head>

<body>

<!-- Luxury Background Video -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-luxury-car-driving-1573/1080p.mp4" type="video/mp4">
</video>

<div class="container">
<h1>ThaiRide Travel</h1>
<p>Luxury SUV พร้อมคนขับมืออาชีพ</p>
<button onclick="document.getElementById('booking').scrollIntoView()">จองรถตอนนี้</button>
</div>

<div class="section">
<h2>รีวิวลูกค้า</h2>
<div class="review">
⭐ บริการดีมาก รถสะอาด ⭐ ตรงเวลา ⭐ คนขับสุภาพ ⭐ ประทับใจมาก ⭐ จะใช้บริการอีกแน่นอน ⭐
</div>
</div>

<div class="section" id="booking">
<h2>จองวันเวลา</h2>
<form>
<input type="text" placeholder="ชื่อของคุณ" required><br>
<input type="tel" placeholder="เบอร์โทร" required><br>
<input type="date" required><br>
<input type="time" required><br>
<select required>
<option value="">เลือกเส้นทาง</option>
<option>สนามบินสุวรรณภูมิ</option>
<option>พัทยา</option>
<option>อยุธยา</option>
</select><br>
<button type="submit">จองและชำระมัดจำ</button>
</form>
</div>

<div class="section">
<h2>ชำระมัดจำออนไลน์</h2>
<p>รองรับบัตรเครดิต / โอน / QR</p>
<button onclick="alert('เชื่อมต่อ Stripe หรือ Omise เพื่อเปิดใช้งานจริง')">ชำระเงิน</button>
</div>

<div class="footer">
© 2026 ThaiRide Travel | รถเช่าพร้อมคนขับ กรุงเทพ
</div>

</body>
</html>
