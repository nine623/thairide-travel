<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThaiRide | Premium Airport Transfer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#000000 0%,#0f0f0f 60%,#000000 100%);
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
}

.container{
  text-align:center;
  padding-top:60px;   /* ระยะบนกระชับ */
  width:100%;
  max-width:500px;
}

h1{
  font-size:42px;
  font-weight:700;
  letter-spacing:1px;
  background:linear-gradient(90deg,#00ff88,#00c853);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  margin-top:10px;
  font-size:18px;
  color:#bbb;
  margin-bottom:35px;
}

/* ปุ่มพรีเมียม */
.button{
  display:inline-block;
  padding:18px 50px;
  font-size:18px;
  font-weight:600;
  border-radius:50px;
  text-decoration:none;
  transition:0.3s;
  margin-bottom:25px;
}

/* ปุ่มแดงหลัก */
.call{
  background:linear-gradient(45deg,#ff0000,#ff3b3b);
  color:white;
  box-shadow:0 10px 25px rgba(255,0,0,0.4);
}

.call:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 35px rgba(255,0,0,0.6);
}

/* QR Box */
.qr-box{
  margin-top:20px;
}

.qr-box p{
  color:#aaa;
  margin-bottom:15px;
}

.qr-box img{
  width:220px;
  border-radius:25px;
  box-shadow:0 15px 35px rgba(0,255,136,0.2);
  transition:0.3s;
  cursor:pointer;
}

.qr-box img:hover{
  transform:scale(1.05);
}

.features{
  margin-top:40px;
  font-size:14px;
  color:#888;
  line-height:1.8;
}

</style>
</head>

<body>

<div class="container">

  <h1>ThaiRide</h1>
  <div class="subtitle">Premium Airport Transfer Service</div>

  <a href="https://lin.ee/MqSk0kZy" target="_blank" class="button call">
    CALL TAXI NOW
  </a>

  <div class="qr-box">
    <p>Scan or Tap QR to Book via LINE</p>
    <a href="https://lin.ee/MqSk0kZy" target="_blank">
      <img src="qr-line.png" alt="LINE QR">
    </a>
  </div>

  <div class="features">
    ✔ Professional Driver<br>
    ✔ Clean & Comfortable SUV<br>
    ✔ On Time Guarantee<br>
    ✔ 24 Hours Service
  </div>

</div>

</body>
</html>
