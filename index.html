
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThaiRide Travel - Visitor Analytics</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card h2{
margin:10px 0;
font-size:30px;
color:#38bdf8;
}

.map{
margin-top:40px;
background:#1e293b;
padding:20px;
border-radius:10px;
}

iframe{
border:0;
width:100%;
height:400px;
border-radius:10px;
}

@media(max-width:768px){

.stats{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🌍 Website Visitor Dashboard</h1>

<div class="stats">

<div class="card">
<p>Visitors Today</p>
<h2 id="today">Loading...</h2>
</div>

<div class="card">
<p>Online Now</p>
<h2 id="online">Loading...</h2>
</div>

<div class="card">
<p>Total Visits</p>
<h2 id="total">Loading...</h2>
</div>

<div class="card">
<p>Countries</p>
<h2 id="country">Loading...</h2>
</div>

<div class="card">
<p>Device</p>
<h2 id="device">Loading...</h2>
</div>

<div class="card">
<p>Browser</p>
<h2 id="browser">Loading...</h2>
</div>

</div>


<div class="map">

<h2 style="text-align:center;">Live Visitor Map</h2>

<iframe src="https://maps.google.com/maps?q=world&t=&z=1&ie=UTF8&iwloc=&output=embed"></iframe>

</div>

</div>


<script>

/* TOTAL VISITS */

fetch("https://api.countapi.xyz/hit/thairide/total")
.then(res=>res.json())
.then(res=>{
document.getElementById("total").innerHTML=res.value
})

/* VISITS TODAY */

let today=new Date().toISOString().slice(0,10)

fetch("https://api.countapi.xyz/hit/thairide/"+today)
.then(res=>res.json())
.then(res=>{
document.getElementById("today").innerHTML=res.value
})

/* ONLINE NOW (simulation) */

document.getElementById("online").innerHTML=
Math.floor(Math.random()*6)+1

/* DEVICE */

let device="Desktop"

if(/Android/i.test(navigator.userAgent)) device="Android"
if(/iPhone|iPad|iPod/i.test(navigator.userAgent)) device="iOS"

document.getElementById("device").innerHTML=device

/* BROWSER */

let browser="Unknown"

if(navigator.userAgent.indexOf("Chrome")>-1) browser="Chrome"
if(navigator.userAgent.indexOf("Safari")>-1) browser="Safari"
if(navigator.userAgent.indexOf("Firefox")>-1) browser="Firefox"

document.getElementById("browser").innerHTML=browser

/* COUNTRY */

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
document.getElementById("country").innerHTML=data.country_name
})

</script>

y.parentNode.insertBefore(t,y);

})(window, document, "clarity", "script", "XXXXXXXX");

</script>


</body>
</html>
